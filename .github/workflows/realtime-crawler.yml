name: Vietlott Realtime Sync

on:
  schedule:
    - cron: '*/10 * * * *'
  
  workflow_dispatch: 

jobs:
  crawl-and-push:
    name: Crawl Vietlott then push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 📥 Kéo source code (Checkout)
        uses: actions/checkout@v6

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 📦 Install uv & dependencies
        run: |
          pip install uv
          uv venv
          uv pip install -r requirements.txt
          uv pip install loguru cattrs attrs polars pendulum requests beautifulsoup4 lxml lxml-html-clean cloudscraper

      - name: 🚀 GoGo
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          SECRET_TOKEN: ${{ secrets.SECRET_TOKEN }}
          PYTHONPATH: src
        run: |
          source .venv/bin/activate
          python src/vietlott/cli/post-api.py
